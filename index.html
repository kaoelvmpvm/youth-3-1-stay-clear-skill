let current='home';
let path=[];
let steps=[];
let runId=0;
const app=document.getElementById('app');
function displayKey(k){return String(k).replace(/[’']/g,'');}
function displayRouteFromEnd(endKey){return String(endKey).replace(/^END_/,'').split('').join(' > ');}
function displayRoute(){return path.map(displayKey).slice(-3).join(' > ');}
function resetState(){path=[];steps=[];current='home';runId++;}
function startChallenge(){resetState();go('S0');}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function renderHome(){resetState();app.innerHTML=`
  <section class="card home">
    <div>
      <div class="mascot">🛡️</div>
      <div class="home-title">青春不染色｜任務啟動</div>
      <p class="home-sub">你將進入一個睡前滑手機的情境。每一步都會影響結局，請依照你的判斷做出選擇，看看自己能不能拿回手機主控權。</p>
      <div class="scene-text">任務目標：覺察誘惑、看見影響、做出阻斷行動。</div>
      <div class="actions"><button class="btn bigStart" onclick="startChallenge()">開始挑戰</button></div>
      
    </div>
    <div class="infoBox">
      <h3>通關提示</h3>
      <ul>
        <li>不要只靠意志力，具體工具更可靠。</li>
        <li>退追蹤、清紀錄、APP 限制都屬於阻斷策略。</li>
        <li>卡關時，找信任的師長或大人聊聊也是行動力。</li>
      </ul>
    </div>
  </section>`;}
function go(id){current=id;renderNode(id)}
function choose(ch){
  // 學生端只記錄 A/B/C，不記錄 A'、A'' 這類內部閱讀符號。
  const displayChoice = displayKey(ch.key);
  if(path.length >= 3){ path=[]; steps=[]; }
  path.push(displayChoice);
  steps.push(ch.step);
  if(ch.next){go(ch.next)} else {renderEnd(ch.end)}
}
function renderNode(id){const n=story[id]; const percent=n.level===1?15:n.level===2?50:82; app.innerHTML=`
  <section class="card">
    <div class="topline"><div class="node">任務進度｜第 ${n.level} 步</div><div class="progress"><div class="bar" style="width:${percent}%"></div></div></div>
    <div class="scene-title">${esc(n.title)}</div>
    <div class="scene-image-wrap"><img class="scene-image" src="${sceneImages[id] || ''}" alt="${esc(n.title)}"></div>
    <div class="scene-text">${esc(n.text)}</div>
    <div class="choices">
      ${n.choices.map((c,i)=>`<button class="choice" onclick='choose(${JSON.stringify(c).replace(/'/g,"&#39;")})'><b>${String.fromCharCode(65+i)}</b><span class="icon">${['📱','🧠','🛑'][i]||'⭐'}</span><span class="ctext">${esc(c.label)}</span></button>`).join('')}
    </div>
    
    <div class="actions"><button class="btn secondary" onclick="renderHome()">回首頁</button><button class="btn ghost" onclick="startChallenge()">重新開始</button></div>
  </section>`;}
function renderEnd(endKey){
  const fb=feedback[endKey]||['','',''];
  const route=displayRouteFromEnd(endKey);
  const actionList=steps.slice(-3).map((s,i)=>`${i+1}. ${esc(s)}`).join('<br>');
  const isPass = passPaths.has(endKey);
  const trophyBlock = isPass ? `
    <div class="trophy-card">
      <div>
        <img class="trophy-img" src="${trophyImage}" alt="成功通關獎盃，青春密碼 0407">
        <div class="trophy-note">通關密碼：0407</div>
      </div>
    </div>` : '';
  app.innerHTML=`
  <section class="card">
    <div class="topline"><div class="node">挑戰完成</div><div class="progress"><div class="bar" style="width:100%"></div></div></div>
    <div class="scene-title">你的挑戰結果</div>
    <div class="result-hero">
      <div>
        <div class="path">${esc(route)}</div>
        <div class="result-grid">
          <div class="resultBox"><h3>① 你的因應行動</h3><p>${actionList}</p></div>
          <div class="resultBox"><h3>② 你表現好的地方</h3><p>${esc(fb[0])}</p></div>
          <div class="resultBox"><h3>③ 你可以這樣做會更棒</h3><p>${esc(fb[1])}</p></div>
          <div class="resultBox cert ${isPass ? 'pass' : 'retry'}"><h3>④ 關卡認證</h3><p>${esc(fb[2])}</p></div>
        </div>
      </div>
      ${trophyBlock}
    </div>
    <div class="actions"><button class="btn" onclick="startChallenge()">再挑戰一次</button><button class="btn secondary" onclick="renderHome()">回首頁</button></div>
  </section>`;
}
